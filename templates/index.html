<!DOCTYPE html>
<html>
<head>
    <title>Daily Tracker</title>
</head>
<body>
    <h1>Daily Tracker</h1>

    <form action="/add" method="POST">
        <input type="text" name="activity_name" placeholder="Enter an activity">
        <button type="submit">Add Activity</button>
    </form>

    <h2>Your Activities</h2>

    <ul>
        {% for activity in activities %}
            <li>{{ activity["name"] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
